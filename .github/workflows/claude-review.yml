name: Claude Code Review

# Reviews are opt-in per PR to keep subscription usage down. Opening a PR only
# posts a picker; the review runs when you apply a `review:<effort>` label
# (one click, PR sidebar) or comment `@claude review <effort>`.
on:
  pull_request:
    types: [opened, reopened, ready_for_review, labeled]
  issue_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # Cheap: no Claude call, just tells you how to start a review.
  picker:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'labeled' &&
      github.event.pull_request.draft == false &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Post effort picker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" --body \
          'Apply a label to start a Claude review:

          | Label | Effort | Use when |
          |---|---|---|
          | `review:low` | fewer, high-confidence findings | small or low-risk diffs |
          | `review:medium` | balanced | the usual default |
          | `review:high` | broad coverage, may include uncertain findings | risky or security-sensitive work |
          | `review:max` | exhaustive | before a release |

          The label is removed once the run starts, so re-applying it re-runs
          the review. Commenting `@claude review <effort>` also works.

          Reviews bill against the Claude subscription of the repo owner, so
          higher levels cost more.'

  review:
    if: >-
      (github.event_name == 'pull_request' &&
       github.event.action == 'labeled' &&
       startsWith(github.event.label.name, 'review:')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.issue.state == 'open' &&
       startsWith(github.event.comment.body, '@claude review') &&
       github.event.comment.user.login == github.repository_owner)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve effort level
        id: effort
        env:
          LABEL: ${{ github.event.label.name }}
          BODY: ${{ github.event.comment.body }}
        run: |
          if [ -n "$LABEL" ]; then
            word="${LABEL#review:}"                       # review:high -> high
          else
            # First word after "@claude review"; empty when omitted.
            word=$(printf '%s' "$BODY" | head -1 | awk '{print tolower($3)}')
          fi
          case "$word" in
            low|medium|high|max) level="$word" ;;
            *)                   level="low" ;;
          esac
          echo "level=$level" >> "$GITHUB_OUTPUT"
          echo "Running review at effort: $level"

      - name: Acknowledge and clear the trigger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABEL: ${{ github.event.label.name }}
          PR: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          if [ -n "$LABEL" ]; then
            # Drop the label so re-applying it triggers a fresh review.
            gh pr edit "$PR" --repo "$GITHUB_REPOSITORY" --remove-label "$LABEL"
          else
            gh api -X POST \
              "repos/$GITHUB_REPOSITORY/issues/comments/${{ github.event.comment.id }}/reactions" \
              -f content=eyes --silent
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          # Explicit token skips the OIDC/GitHub-App exchange, which would
          # otherwise need `id-token: write` plus the Claude App installed.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number || github.event.issue.number }}"
          claude_args: "--effort ${{ steps.effort.outputs.level }}"
