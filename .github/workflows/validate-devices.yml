name: Validate devices.json

on:
  pull_request:
    paths:
      - 'devices.json'
      - 'tools/validate-devices.py'
      - '.github/workflows/validate-devices.yml'
  push:
    branches: [main]
    paths:
      - 'devices.json'
      - 'tools/validate-devices.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate devices.json
        run: python tools/validate-devices.py devices.json
